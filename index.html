<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gomes Del Pozo Advogados — Processos Trabalhistas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#F5F3EF;--surface:#FFFFFF;--surface2:#F0EDE8;--border:#E2DDD6;--border2:#CEC9C0;
    --text:#1C1917;--text2:#6B6560;--text3:#A8A39C;
    --accent:#2D5A3D;--accent-light:#E8F2EC;
    --amber:#92400E;--amber-light:#FEF3C7;
    --blue:#1E3A5F;--blue-light:#DBEAFE;
    --red:#7F1D1D;--red-light:#FEE2E2;
    --radius:10px;--radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  .app{display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--text);letter-spacing:-0.01em}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
  .sync-dot.ok{background:#16A34A}.sync-dot.err{background:#DC2626}.sync-dot.loading{background:#D97706;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .main{flex:1;padding:2rem;max-width:980px;margin:0 auto;width:100%}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow)}
  .metric-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px}
  .metric-value{font-size:28px;font-weight:300;color:var(--text);font-family:'DM Mono',monospace;letter-spacing:-0.02em}
  .metric-value.green{color:var(--accent)}.metric-value.amber{color:var(--amber)}.metric-value.blue{color:var(--blue)}
  .controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;gap:10px;align-items:center;margin-bottom:1rem;box-shadow:var(--shadow);flex-wrap:wrap}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  input[type="text"]{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s}
  input[type="text"]:focus{border-color:var(--accent);background:white}
  select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
  select:focus{border-color:var(--accent)}
  .btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap}
  .btn:hover{background:var(--surface2);border-color:var(--border2)}.btn:active{transform:scale(0.98)}
  .btn-primary{background:var(--accent);color:white;border-color:var(--accent)}.btn-primary:hover{background:#244d34;border-color:#244d34}
  .btn-danger{color:#A32D2D}.btn-sm{padding:5px 10px;font-size:12px}
  .list{display:flex;flex-direction:column;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:border-color 0.15s}
  .card:hover{border-color:var(--border2)}.card.expanded{border-color:#9DC4AB}
  .card-header{padding:0.875rem 1.25rem;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
  .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:0.02em}
  .av-waiting{background:var(--amber-light);color:var(--amber)}.av-ready{background:var(--accent-light);color:var(--accent)}.av-distributed{background:var(--blue-light);color:var(--blue)}.av-canceled{background:var(--red-light);color:var(--red)}
  .card-name{font-weight:500;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:12px;color:var(--text3);margin-top:1px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:4px}
  .badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;white-space:nowrap;letter-spacing:0.01em;flex-shrink:0}
  .badge-waiting{background:var(--amber-light);color:var(--amber)}.badge-ready{background:var(--accent-light);color:var(--accent)}.badge-distributed{background:var(--blue-light);color:var(--blue)}.badge-canceled{background:var(--red-light);color:var(--red)}
  .chevron{color:var(--text3);transition:transform 0.2s;flex-shrink:0}.card.expanded .chevron{transform:rotate(180deg)}
  .card-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)}.card.expanded .card-body{display:block}
  .body-top{display:flex;align-items:center;gap:10px;padding:0.875rem 0 1rem;flex-wrap:wrap}
  .section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px}
  .docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:1rem}
  .doc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;font-size:12px;color:var(--text2);background:var(--bg)}
  .doc-item:hover{border-color:var(--border2);background:white}.doc-item.ok{border-color:#9DC4AB;background:var(--accent-light);color:var(--accent)}
  .doc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.doc-item.ok .doc-dot{background:var(--accent)}.doc-item:not(.ok) .doc-dot{background:var(--border2)}
  .notes-section{margin-top:0.5rem}
  textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);resize:vertical;min-height:64px;outline:none;line-height:1.5}
  textarea:focus{border-color:var(--accent);background:white}
  .progress-bar{width:80px;height:4px;background:var(--border);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.3s}
  .divider{width:1px;height:14px;background:var(--border);flex-shrink:0}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .overlay.active{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:460px;padding:1.5rem;box-shadow:var(--shadow-md);transform:translateY(8px);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
  .overlay.active .modal{transform:translateY(0)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .modal-title{font-size:16px;font-weight:600;letter-spacing:-0.01em}
  .modal-close{width:28px;height:28px;border:none;background:var(--surface2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);line-height:1}
  .modal-close:hover{background:var(--border)}
  .form-row{margin-bottom:14px}.form-row label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
  .form-row input,.form-row select,.form-row textarea{width:100%}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
  .lawsuit-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
  .lawsuit-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .lawsuit-panel-title{font-size:13px;font-weight:600;color:var(--text2)}
  .lawsuit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
  .lawsuit-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius)}
  .lawsuit-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .lawsuit-row-name{flex:1;font-size:13px;color:var(--text);font-weight:500}
  .lawsuit-row-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
  .lawsuit-add-row{display:flex;gap:8px;align-items:center}.lawsuit-add-row input{padding:7px 10px;flex:1}
  .color-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s;flex-shrink:0}.color-swatch.selected{border-color:var(--text)}
  .empty{text-align:center;padding:4rem 2rem;color:var(--text3)}.empty-icon{font-size:36px;margin-bottom:12px}.empty h3{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px}.empty p{font-size:13px}
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:200}
  .loading-screen h2{font-size:16px;font-weight:500;color:var(--text2)}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:640px){.metrics{grid-template-columns:repeat(2,1fr)}.topbar{padding:0 1rem}.main{padding:1rem}.controls{flex-direction:column;align-items:stretch}.search-wrap{min-width:unset}}
</style>
</head>

    <div class="list" id="list"></div>
  </div>
</div>

    <div class="form-row"><label>Observações</label><textarea id="fNotes" rows="3" placeholder="Anotações, pendências, contato..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeClientModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">Salvar cliente</button>
    </div>
  </div>
</div>

/* ─── SUPABASE API ─── */
async function sbFetch(path, opts={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const el  = document.getElementById('syncMsg');
  dot.className = 'sync-dot ' + state;
  el.textContent = msg;
}

/* ─── LOAD DATA ─── */
async function loadData() {
  try {
    setSyncStatus('loading', 'Carregando...');
    const rows = await sbFetch('clients?select=*&order=name.asc');
    if (rows && rows.length > 0) {
      clients = rows.map(r => ({
        id: r.id, name: r.name, lawsuit: r.lawsuit,
        status: r.status, process: r.process||'',
        notes: r.notes||'', docs: r.docs||{},
        createdAt: r.created_at||''
      }));
      setSyncStatus('ok', 'Sincronizado');
    } else {
      // First time: seed with preloaded data
      setSyncStatus('loading', 'Importando clientes...');
      await seedData();
    }
  } catch(e) {
    setSyncStatus('err', 'Erro de conexão');
    console.error(e);
  }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appWrapper').style.display = 'flex';
  render();
}

async function seedData() {
  // Insert in batches of 50
  const batch = 50;
  for (let i=0; i<PRELOADED.length; i+=batch) {
    const chunk = PRELOADED.slice(i,i+batch).map(c=>({
      id:c.id, name:c.name, lawsuit:c.lawsuit, status:c.status,
      process:c.process||'', notes:c.notes||'', docs:c.docs||{}, created_at:c.createdAt||''
    }));
    await sbFetch('clients', {method:'POST', prefer:'resolution=ignore-duplicates', body:JSON.stringify(chunk)});
  }
  const rows = await sbFetch('clients?select=*&order=name.asc');
  clients = rows.map(r=>(({id:r.id,name:r.name,lawsuit:r.lawsuit,status:r.status,process:r.process||'',notes:r.notes||'',docs:r.docs||{},createdAt:r.created_at||''})));
  setSyncStatus('ok', 'Pronto');
}

/* ─── CRUD ─── */
async function upsertClient(c) {
  try {
    setSyncStatus('loading','Salvando...');
    await sbFetch('clients?id=eq.'+c.id, {
      method:'PATCH', prefer:'return=minimal',
      body: JSON.stringify({name:c.name,lawsuit:c.lawsuit,status:c.status,process:c.process,notes:c.notes,docs:c.docs,created_at:c.createdAt})
    });
    setSyncStatus('ok','Salvo ✓');
  } catch(e) { setSyncStatus('err','Erro ao salvar'); }
}

async function insertClient(c) {
  try {
    setSyncStatus('loading','Salvando...');
    await sbFetch('clients', {
      method:'POST', prefer:'return=minimal',
      body: JSON.stringify([{id:c.id,name:c.name,lawsuit:c.lawsuit,status:c.status,process:c.process,notes:c.notes,docs:c.docs,created_at:c.createdAt}])
    });
    setSyncStatus('ok','Salvo ✓');
  } catch(e) { setSyncStatus('err','Erro ao salvar'); }
}

async function deleteClientDb(id) {
  try {
    await sbFetch('clients?id=eq.'+id, {method:'DELETE'});
    setSyncStatus('ok','Removido');
  } catch(e) { setSyncStatus('err','Erro ao remover'); }
}

/* ─── HELPERS ─── */
function getLawsuit(id) { return lawsuits.find(l=>l.id===id) || {name:id,color:PALETTE[0]}; }
function initials(name) { return name.trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }

      <div class="lawsuit-row-count">${count} cliente${count!==1?'s':''}</div>
      <button class="btn btn-sm btn-danger" onclick="removeLawsuit('${l.id}')" ${count>0?'disabled style="opacity:0.35;cursor:not-allowed"':''}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
      </button>
    </div>`;
  }).join('');
  updateLawsuitFilter(); updateLawsuitSelects();
}

function renderColorStrip() {
  document.getElementById('colorStrip').innerHTML=PALETTE.map((p,i)=>`<div class="color-swatch${selectedColor===i?' selected':''}" style="background:${p.dot}" onclick="selectColor(${i})"></div>`).join('');
}
function selectColor(i){selectedColor=i;renderColorStrip();}

function addLawsuit() {
  const name=document.getElementById('newLawsuitName').value.trim();
  if(!name) return;
  const id='ls_'+Date.now();
  lawsuits.push({id,name,color:PALETTE[selectedColor]});
  document.getElementById('newLawsuitName').value='';
  selectedColor=(selectedColor+1)%PALETTE.length;
  renderLawsuitPanel(); render();
}

function removeLawsuit(id) {
  if(clients.filter(c=>c.lawsuit===id).length>0) return;
  if(!confirm('Remover este processo?')) return;
  lawsuits=lawsuits.filter(l=>l.id!==id);
  renderLawsuitPanel(); render();
}

function updateLawsuitFilter() {
  const sel=document.getElementById('filterLawsuit');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todos os processos</option>'+lawsuits.map(l=>`<option value="${l.id}"${cur===l.id?' selected':''}>${l.name}</option>`).join('');
}

function updateLawsuitSelects() {
  const sel=document.getElementById('fLawsuit');
  if(!sel) return;
  const cur=sel.value;
  sel.innerHTML=lawsuits.map(l=>`<option value="${l.id}"${cur===l.id?' selected':''}>${l.name}</option>`).join('');
}

/* ─── CLIENT MODAL ─── */
function openClientModal(id=null) {
  editId=id; updateLawsuitSelects();
  document.getElementById('clientModalTitle').textContent=id?'Editar cliente':'Novo cliente';
  if(id) {
    const c=clients.find(x=>x.id===id);
    document.getElementById('fName').value=c.name;
    document.getElementById('fLawsuit').value=c.lawsuit||'';
    document.getElementById('fStatus').value=c.status;
    document.getElementById('fProcess').value=c.process||'';
    document.getElementById('fNotes').value=c.notes||'';
  } else {
    document.getElementById('fName').value='';
    document.getElementById('fLawsuit').value=lawsuits[0]?.id||'';
    document.getElementById('fStatus').value='waiting';
    document.getElementById('fProcess').value='';
    document.getElementById('fNotes').value='';
  }
  document.getElementById('clientOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('fName').focus(),80);
}

function closeClientModal() { document.getElementById('clientOverlay').classList.remove('active'); editId=null; }

async function saveClient() {
  const name=document.getElementById('fName').value.trim();
  if(!name) return;
  const lawsuit=document.getElementById('fLawsuit').value;
  const status=document.getElementById('fStatus').value;
  const process=document.getElementById('fProcess').value.trim();
  const notes=document.getElementById('fNotes').value.trim();
  if(editId) {
    const c=clients.find(x=>x.id===editId);
    Object.assign(c,{name,lawsuit,status,process,notes});
    await upsertClient(c);
  } else {
    const c={id:Date.now().toString(),name,lawsuit,status,process,notes,docs:{},createdAt:new Date().toLocaleDateString('pt-BR')};
    clients.unshift(c);
    await insertClient(c);
  }
  closeClientModal(); render();
}

/* ─── DOCS ─── */
async function toggleDoc(id, doc) {
  const c=clients.find(x=>x.id===id);
  c.docs=c.docs||{};
  c.docs[doc]=!c.docs[doc];
  const key=doc.replace(/[^a-zA-Z0-9]/g,'_');
  const el=document.getElementById('doc-'+id+'-'+key);
  if(el){el.className='doc-item'+(c.docs[doc]?' ok':'');el.querySelector('.doc-dot').style.background=c.docs[doc]?'var(--accent)':'var(--border2)';}
  updateCardMeta(id); updateMetrics();
  await upsertClient(c);
}

function updateCardMeta(id) {
  const c=clients.find(x=>x.id===id);
  const ok=DOCS.filter(d=>c.docs&&c.docs[d]).length;
  const pct=Math.round(ok/DOCS.length*100);
  const meta=document.getElementById('meta-'+id);
  const fill=document.getElementById('fill-'+id);
  if(meta) meta.textContent=ok+'/'+DOCS.length+' docs';
  if(fill) fill.style.width=pct+'%';
}

async function updateStatus(id,val) {
  const c=clients.find(x=>x.id===id); c.status=val;
  renderCard(id); updateMetrics();
  await upsertClient(c);
}

async function updateLawsuitInline(id,val) {
  const c=clients.find(x=>x.id===id); c.lawsuit=val;
  renderCard(id);
  await upsertClient(c);
}

async function updateNotes(id,val) {
  const c=clients.find(x=>x.id===id); c.notes=val;
  await upsertClient(c);
}

async function deleteClient(id) {
  if(!confirm('Remover este cliente permanentemente?')) return;
  clients=clients.filter(x=>x.id!==id);
  expanded.delete(id);
  render();
  await deleteClientDb(id);
}

/* ─── EXPAND ─── */
function toggleExpand(id) {
  if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
  renderCard(id);
}

/* ─── CARD HTML ─── */
function cardHTML(c) {
  const docs=c.docs||{};
  const ok=DOCS.filter(d=>docs[d]).length;
  const pct=Math.round(ok/DOCS.length*100);
  const l=getLawsuit(c.lawsuit);
  return `
    <div class="card-header" onclick="toggleExpand('${c.id}')">
      <div class="avatar ${AV_CLASS[c.status]}">${initials(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          <span id="meta-${c.id}">${ok}/${DOCS.length} docs</span>
          <div class="progress-bar"><div class="progress-fill" id="fill-${c.id}" style="width:${pct}%"></div></div>
          ${c.process?`<span style="margin-left:4px;color:var(--text3)">· ${c.process}</span>`:''}
        </div>
      </div>
      <span class="badge ${STATUS_BADGE[c.status]}" style="margin-right:4px">${STATUS_LABEL[c.status]}</span>
      <span class="badge" style="background:${l.color.bg};color:${l.color.text};margin-right:8px">${l.name}</span>
      <button class="btn btn-sm" onclick="event.stopPropagation();openClientModal('${c.id}')" title="Editar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      </button>
      <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteClient('${c.id}')" title="Remover">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
      </button>
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
    <div class="card-body">
      <div class="body-top">
        <span style="font-size:12px;color:var(--text2);font-weight:500">Status:</span>
        <select onchange="updateStatus('${c.id}',this.value)" style="font-size:13px" onclick="event.stopPropagation()">
          ${Object.entries(STATUS_LABEL).map(([k,v])=>`<option value="${k}"${c.status===k?' selected':''}>${v}</option>`).join('')}
        </select>
        <span style="font-size:12px;color:var(--text2);font-weight:500;margin-left:8px">Processo:</span>
        <select onchange="updateLawsuitInline('${c.id}',this.value)" style="font-size:13px" onclick="event.stopPropagation()">
          ${lawsuits.map(ls=>`<option value="${ls.id}"${c.lawsuit===ls.id?' selected':''}>${ls.name}</option>`).join('')}
        </select>
        ${c.createdAt?`<span style="font-size:11px;color:var(--text3);margin-left:auto">Cadastrado em ${c.createdAt}</span>`:''}
      </div>
      <div class="section-label">Documentos recebidos</div>
      <div class="docs-grid">
        ${DOCS.map(d=>{
          const key=d.replace(/[^a-zA-Z0-9]/g,'_');
          const isOk=!!(docs[d]);
          return `<div class="doc-item${isOk?' ok':''}" id="doc-${c.id}-${key}" onclick="toggleDoc('${c.id}','${d}')">
            <div class="doc-dot" style="background:${isOk?'var(--accent)':'var(--border2)'}"></div>
            <span>${d}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="notes-section">
        <div class="section-label">Observações</div>
        <textarea onchange="updateNotes('${c.id}',this.value)" placeholder="Anotações...">${c.notes||''}</textarea>
      </div>
    </div>`;
}

function renderCard(id) {
  const c=clients.find(x=>x.id===id);
  const el=document.getElementById('card-'+id);
  if(!el) return;
  el.className='card'+(expanded.has(id)?' expanded':'');
  el.innerHTML=cardHTML(c);
}

function updateMetrics() {
  const total=clients.length;
  const waiting=clients.filter(c=>c.status==='waiting').length;
  const ready=clients.filter(c=>c.status==='ready').length;
  const distributed=clients.filter(c=>c.status==='distributed').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total de clientes</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Aguardando docs</div><div class="metric-value amber">${waiting}</div></div>
    <div class="metric"><div class="metric-label">Prontos para distribuir</div><div class="metric-value green">${ready}</div></div>
    <div class="metric"><div class="metric-label">Distribuídos</div><div class="metric-value blue">${distributed}</div></div>`;
}

function render() {
  updateMetrics(); updateLawsuitFilter();
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('filterStatus').value;
  const fl=document.getElementById('filterLawsuit').value;
  const filtered=clients.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)) return false;
    if(fs&&c.status!==fs) return false;
    if(fl&&c.lawsuit!==fl) return false;
    return true;
  });
  const list=document.getElementById('list');
  if(!filtered.length) {
    list.innerHTML=`<div class="empty"><div class="empty-icon">📂</div><h3>${clients.length===0?'Nenhum cliente':'Nenhum resultado encontrado'}</h3><p>${clients.length===0?'Clique em Novo cliente para começar.':'Tente outro nome ou filtro.'}</p></div>`;
    return;
  }
  list.innerHTML=filtered.map(c=>`<div class="card${expanded.has(c.id)?' expanded':''}" id="card-${c.id}">${cardHTML(c)}</div>`).join('');
}

function exportCSV() {
  const header=['Nome','Processo','Status','Número do processo',...DOCS,'Observações','Cadastrado em'];
  const rows=clients.map(c=>{
    const d=c.docs||{};
    const l=getLawsuit(c.lawsuit);
    return [c.name,l.name,STATUS_LABEL[c.status],c.process||'',...DOCS.map(doc=>d[doc]?'Sim':'Não'),c.notes||'',c.createdAt||''];
  });
  const csv=[header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='clientes_'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.csv';
  a.click();
}

loadData();
</script>
</body>
</html>
